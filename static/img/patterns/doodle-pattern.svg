<svg width="380" height="380" viewBox="0 0 380 380" xmlns="http://www.w3.org/2000/svg" stroke="#FFFFFF" stroke-opacity="0.11" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" font-family="Inter, Arial, Helvetica, sans-serif">
  <!-- plus -->
  <g transform="translate(30,36) rotate(-8)">
    <line x1="-11" y1="0" x2="11" y2="0"/>
    <line x1="0" y1="-11" x2="0" y2="11"/>
  </g>

  <!-- multiply -->
  <g transform="translate(168,28) rotate(6)">
    <line x1="-9" y1="-9" x2="9" y2="9"/>
    <line x1="9" y1="-9" x2="-9" y2="9"/>
  </g>

  <!-- equals -->
  <g transform="translate(300,54) rotate(-4)">
    <line x1="-12" y1="-5" x2="12" y2="-5"/>
    <line x1="-12" y1="5" x2="12" y2="5"/>
  </g>

  <!-- minus -->
  <g transform="translate(104,104) rotate(10)">
    <line x1="-11" y1="0" x2="11" y2="0"/>
  </g>

  <!-- divide -->
  <g transform="translate(240,128) rotate(-6)">
    <line x1="-11" y1="0" x2="11" y2="0"/>
    <circle cx="0" cy="-9" r="1.8" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
    <circle cx="0" cy="9" r="1.8" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- square root -->
  <g transform="translate(48,168) rotate(-4)" stroke-width="2.6">
    <path d="M-14 4 L-8 10 L-2 -10 L16 -10"/>
  </g>

  <!-- pi -->
  <text x="150" y="176" font-size="30" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(6 150 176)">π</text>

  <!-- infinity -->
  <g transform="translate(320,190) rotate(3)" stroke-width="2.6">
    <path d="M-11 0 C-11 -7 -4 -7 0 0 C4 7 11 7 11 0 C11 -7 4 -7 0 0 C-4 7 -11 7 -11 0 Z"/>
  </g>

  <!-- sigma -->
  <text x="40" y="240" font-size="30" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-8 40 240)">∑</text>

  <!-- x squared -->
  <text x="230" y="240" font-size="26" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(8 230 240)">x²</text>

  <!-- approx -->
  <g transform="translate(120,80) rotate(-5)" stroke-width="2.4">
    <path d="M-12 3 C-8 -3 -4 3 0 -3 C4 -9 8 -3 12 3" transform="translate(0,-8)"/>
  </g>

  <!-- one half fraction -->
  <text x="300" y="290" font-size="24" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-6 300 290)">½</text>

  <!-- pencil -->
  <g transform="translate(178,214) rotate(-38)">
    <path d="M-14 8 L8 8 L14 0 L8 -8 L-14 -8 Z"/>
    <line x1="-6" y1="-8" x2="-6" y2="8"/>
  </g>

  <!-- open book -->
  <g transform="translate(70,300)">
    <path d="M-16 -6 C-10 -10 -4 -10 0 -6 C4 -10 10 -10 16 -6 L16 8 C10 4 4 4 0 8 C-4 4 -10 4 -16 8 Z"/>
    <line x1="0" y1="-6" x2="0" y2="8"/>
  </g>

  <!-- graduation cap -->
  <g transform="translate(290,330) rotate(4)">
    <path d="M-16 0 L0 -8 L16 0 L0 8 Z"/>
    <path d="M-8 3.5 L-8 12 C-8 15 8 15 8 12 L8 3.5"/>
    <line x1="16" y1="0" x2="16" y2="12"/>
  </g>

  <!-- star -->
  <g transform="translate(210,60) rotate(12)" stroke-width="2.4">
    <path d="M0 -10 L2.6 -3.2 L10 -3.2 L4 1.2 L6.2 8 L0 3.6 L-6.2 8 L-4 1.2 L-10 -3.2 L-2.6 -3.2 Z"/>
  </g>

  <!-- ruler -->
  <g transform="translate(120,332) rotate(-16)" stroke-width="2.4">
    <rect x="-16" y="-5" width="32" height="10" rx="2"/>
    <line x1="-8" y1="-5" x2="-8" y2="0"/>
    <line x1="0" y1="-5" x2="0" y2="1.5"/>
    <line x1="8" y1="-5" x2="8" y2="0"/>
  </g>

  <!-- atom / orbit -->
  <g transform="translate(330,100)" stroke-width="2.2">
    <ellipse rx="14" ry="6"/>
    <ellipse rx="14" ry="6" transform="rotate(60)"/>
    <ellipse rx="14" ry="6" transform="rotate(120)"/>
    <circle r="2.4" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- small plus -->
  <g transform="translate(20,350) rotate(14)">
    <line x1="-8" y1="0" x2="8" y2="0"/>
    <line x1="0" y1="-8" x2="0" y2="8"/>
  </g>
</svg>
