<svg width="2000" height="130" viewBox="0 0 2000 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" font-family="Inter, Arial, Helvetica, sans-serif">
  <!-- torn-paper cut, same shape as static/img/patterns/torn-edge-combined.svg -->
  <path d="M 0 130 L 0 53 L 22 59 L 44 64 L 58 60 L 71 78 L 81 76 L 90 66 L 112 64 L 125 66 L 135 40 L 143 42 L 157 48 L 180 25 L 196 36 L 206 38 L 221 35 L 232 48 L 252 23 L 260 41 L 269 54 L 289 55 L 303 50 L 313 42 L 334 39 L 349 35 L 371 36 L 385 36 L 397 40 L 417 39 L 433 53 L 450 44 L 463 54 L 474 32 L 496 45 L 500 53 L 514 54 L 533 56 L 547 63 L 570 54 L 592 34 L 602 41 L 616 42 L 636 38 L 658 36 L 676 49 L 696 46 L 706 51 L 714 47 L 725 40 L 744 27 L 765 28 L 777 46 L 796 49 L 809 57 L 826 50 L 850 42 L 860 72 L 882 59 L 904 50 L 917 46 L 939 57 L 949 62 L 967 51 L 986 46 L 1004 27 L 1000 53 L 1020 51 L 1034 50 L 1043 57 L 1052 53 L 1067 55 L 1091 52 L 1114 81 L 1123 76 L 1145 74 L 1161 74 L 1174 72 L 1183 56 L 1197 48 L 1209 53 L 1223 49 L 1242 46 L 1264 44 L 1283 49 L 1303 55 L 1322 48 L 1341 43 L 1355 38 L 1379 52 L 1390 56 L 1406 58 L 1423 59 L 1435 60 L 1457 40 L 1470 47 L 1492 43 L 1515 23 L 1500 53 L 1509 57 L 1519 64 L 1535 69 L 1548 68 L 1558 64 L 1567 53 L 1587 71 L 1608 73 L 1623 59 L 1637 63 L 1652 63 L 1668 55 L 1676 61 L 1692 62 L 1704 63 L 1714 66 L 1737 70 L 1749 70 L 1762 59 L 1782 37 L 1792 33 L 1810 61 L 1818 59 L 1826 61 L 1836 52 L 1849 44 L 1873 42 L 1883 66 L 1897 64 L 1921 57 L 1944 55 L 1952 51 L 1972 46 L 1996 56 L 2000 53 L 2000 130 Z"
        fill="#000000" fill-opacity="0.055"/>
  <path d="M 0 130 L 0 48 L 22 54 L 44 59 L 58 55 L 71 73 L 81 71 L 90 61 L 112 59 L 125 61 L 135 35 L 143 37 L 157 43 L 180 20 L 196 31 L 206 33 L 221 30 L 232 43 L 252 18 L 260 36 L 269 49 L 289 50 L 303 45 L 313 37 L 334 34 L 349 30 L 371 31 L 385 31 L 397 35 L 417 34 L 433 48 L 450 39 L 463 49 L 474 27 L 496 40 L 500 48 L 514 49 L 533 51 L 547 58 L 570 49 L 592 29 L 602 36 L 616 37 L 636 33 L 658 31 L 676 44 L 696 41 L 706 46 L 714 42 L 725 35 L 744 22 L 765 23 L 777 41 L 796 44 L 809 52 L 826 45 L 850 37 L 860 67 L 882 54 L 904 45 L 917 41 L 939 52 L 949 57 L 967 46 L 986 41 L 1004 22 L 1000 48 L 1020 46 L 1034 45 L 1043 52 L 1052 48 L 1067 50 L 1091 47 L 1114 76 L 1123 71 L 1145 69 L 1161 69 L 1174 67 L 1183 51 L 1197 43 L 1209 48 L 1223 44 L 1242 41 L 1264 39 L 1283 44 L 1303 50 L 1322 43 L 1341 38 L 1355 33 L 1379 47 L 1390 51 L 1406 53 L 1423 54 L 1435 55 L 1457 35 L 1470 42 L 1492 38 L 1515 18 L 1500 48 L 1509 52 L 1519 59 L 1535 64 L 1548 63 L 1558 59 L 1567 48 L 1587 66 L 1608 68 L 1623 54 L 1637 58 L 1652 58 L 1668 50 L 1676 56 L 1692 57 L 1704 58 L 1714 61 L 1737 65 L 1749 65 L 1762 54 L 1782 32 L 1792 28 L 1810 56 L 1818 54 L 1826 56 L 1836 47 L 1849 39 L 1873 37 L 1883 61 L 1897 59 L 1921 52 L 1944 50 L 1952 46 L 1972 41 L 1996 51 L 2000 48 L 2000 130 Z"
        fill="#FAFAFA"/>

  <!-- black doodles, drawn on top of the white cut so they sit inside the
       white paper area (not the dark torn band above it) — dense, varied,
       irregular placement, same shape vocabulary as doodle-combined.svg -->
  <g stroke="#000000" stroke-opacity="0.13" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- clock -->
    <g transform="translate(30,108) rotate(-8) scale(0.62)">
      <circle r="13"/><line x1="0" y1="0" x2="0" y2="-7"/><line x1="0" y1="0" x2="5" y2="3"/>
    </g>
    <!-- plus -->
    <g transform="translate(95,119) rotate(14) scale(0.55)">
      <line x1="-10" y1="0" x2="10" y2="0"/><line x1="0" y1="-10" x2="0" y2="10"/>
    </g>
    <!-- pi -->
    <text x="140" y="106" font-size="20" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(-6 140 106)">&#960;</text>
    <!-- multiply -->
    <g transform="translate(205,123) rotate(-22) scale(0.6)">
      <line x1="-8" y1="-8" x2="8" y2="8"/><line x1="8" y1="-8" x2="-8" y2="8"/>
    </g>
    <!-- pencil -->
    <g transform="translate(258,105) rotate(40) scale(0.6)">
      <path d="M-12 7 L7 7 L12 0 L7 -7 L-12 -7 Z"/><line x1="-5" y1="-7" x2="-5" y2="7"/>
    </g>
    <!-- sigma -->
    <text x="315" y="118" font-size="19" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(4 315 118)">&#8721;</text>
    <!-- flask -->
    <g transform="translate(378,100) rotate(-3) scale(0.6)">
      <path d="M-3 -11 L-3 -1 L-9 11 C-10 13 -8 14 -6 14 L6 14 C8 14 10 13 9 11 L3 -1 L3 -11"/><line x1="-4" y1="-11" x2="4" y2="-11"/>
    </g>
    <!-- x squared -->
    <text x="428" y="123" font-size="16" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(8 428 123)">x&#178;</text>
    <!-- graduation cap -->
    <g transform="translate(488,108) rotate(2) scale(0.65)">
      <path d="M-14 0 L0 -7 L14 0 L0 7 Z"/><path d="M-7 3 L-7 10 C-7 13 7 13 7 10 L7 3"/><line x1="14" y1="0" x2="14" y2="10"/>
    </g>
    <!-- half -->
    <text x="545" y="119" font-size="15" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(-10 545 119)">&#189;</text>
    <!-- open book -->
    <g transform="translate(602,98) rotate(-4) scale(0.6)">
      <path d="M-14 -5 C-9 -9 -3.5 -9 0 -5 C3.5 -9 9 -9 14 -5 L14 7 C9 3.5 3.5 3.5 0 7 C-3.5 3.5 -9 3.5 -14 7 Z"/><line x1="0" y1="-5" x2="0" y2="7"/>
    </g>
    <!-- divide -->
    <g transform="translate(655,116) rotate(12) scale(0.55)">
      <line x1="-10" y1="0" x2="10" y2="0"/>
      <circle cx="0" cy="-8" r="1.6" fill="#000000" fill-opacity="0.13" stroke="none"/>
      <circle cx="0" cy="8" r="1.6" fill="#000000" fill-opacity="0.13" stroke="none"/>
    </g>
    <!-- wifi -->
    <g transform="translate(705,124) rotate(6) scale(0.55)">
      <path d="M-10 -2 C-4 -9 4 -9 10 -2"/><path d="M-5 2 C-2 -2 2 -2 5 2"/>
      <circle cx="0" cy="6" r="1.4" fill="#000000" fill-opacity="0.13" stroke="none"/>
    </g>
    <!-- code brackets -->
    <text x="752" y="104" font-size="16" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(-8 752 104)">&lt;/&gt;</text>
    <!-- hourglass -->
    <g transform="translate(815,118) rotate(4) scale(0.6)">
      <path d="M-8 -11 L8 -11 L0 0 L8 11 L-8 11 L0 0 Z"/><line x1="-10" y1="-11" x2="10" y2="-11"/><line x1="-10" y1="11" x2="10" y2="11"/>
    </g>
    <!-- binary -->
    <text x="866" y="101" font-size="14" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(5 866 101)">01</text>
    <!-- column -->
    <g transform="translate(925,122) rotate(-8) scale(0.55)">
      <rect x="-12" y="-12" width="24" height="5" rx="1"/><rect x="-12" y="9" width="24" height="5" rx="1"/>
      <line x1="-7" y1="-7" x2="-7" y2="9"/><line x1="0" y1="-7" x2="0" y2="9"/><line x1="7" y1="-7" x2="7" y2="9"/>
    </g>
    <!-- quote -->
    <text x="972" y="112" font-size="24" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(-4 972 112)">&#8220;</text>
    <!-- globe -->
    <g transform="translate(1030,97) rotate(-8) scale(0.6)">
      <circle r="13"/><ellipse rx="5.5" ry="13"/><line x1="-13" y1="0" x2="13" y2="0"/>
    </g>
    <!-- letter A -->
    <text x="1080" y="121" font-size="18" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(12 1080 121)">A</text>
    <!-- flag -->
    <g transform="translate(1140,106) rotate(-8) scale(0.62)">
      <line x1="0" y1="-13" x2="0" y2="13"/><path d="M0 -11 L15 -6 L0 -1 Z"/>
    </g>
    <!-- speech bubble -->
    <g transform="translate(1195,123) rotate(4) scale(0.55)">
      <path d="M-13 -8 L13 -8 C15 -8 16 -7 16 -5 L16 3 C16 5 15 6 13 6 L-3 6 L-9 11 L-8 6 L-13 6 C-15 6 -16 5 -16 3 L-16 -5 C-16 -7 -15 -8 -13 -8 Z"/>
    </g>
    <!-- molecule -->
    <g transform="translate(1250,100) rotate(-6) scale(0.6)">
      <path d="M0 -11 L9.5 -5.5 L9.5 5.5 L0 11 L-9.5 5.5 L-9.5 -5.5 Z"/>
      <circle cx="0" cy="-11" r="1.6" fill="#000000" fill-opacity="0.13" stroke="none"/>
      <circle cx="0" cy="11" r="1.6" fill="#000000" fill-opacity="0.13" stroke="none"/>
    </g>
    <!-- equals -->
    <g transform="translate(1312,117) rotate(14) scale(0.55)">
      <line x1="-11" y1="-5" x2="11" y2="-5"/><line x1="-11" y1="5" x2="11" y2="5"/>
    </g>
    <!-- atom -->
    <g transform="translate(1367,107) rotate(6) scale(0.6)">
      <ellipse rx="13" ry="5.5"/><ellipse rx="13" ry="5.5" transform="rotate(60)"/><ellipse rx="13" ry="5.5" transform="rotate(120)"/>
      <circle r="2.2" fill="#000000" fill-opacity="0.13" stroke="none"/>
    </g>
    <!-- chip -->
    <g transform="translate(1422,96) rotate(0) scale(0.55)">
      <rect x="-10" y="-10" width="20" height="20" rx="3"/>
      <line x1="-15" y1="-5" x2="-10" y2="-5"/><line x1="-15" y1="5" x2="-10" y2="5"/>
      <line x1="15" y1="-5" x2="10" y2="-5"/><line x1="15" y1="5" x2="10" y2="5"/>
    </g>
    <!-- square root -->
    <g transform="translate(1476,120) rotate(-8) scale(0.6)">
      <path d="M-12 4 L-7 9 L-2 -9 L14 -9"/>
    </g>
    <!-- scroll -->
    <g transform="translate(1531,104) rotate(2) scale(0.55)">
      <rect x="-9" y="-11" width="18" height="22" rx="1"/>
      <circle cx="-9" cy="-11" r="3"/><circle cx="-9" cy="11" r="3"/><circle cx="9" cy="-11" r="3"/><circle cx="9" cy="11" r="3"/>
    </g>
    <!-- leaf -->
    <g transform="translate(1586,117) rotate(-2) scale(0.6)">
      <path d="M0 -13 C10 -9 10 9 0 13 C-10 9 -10 -9 0 -13 Z"/><line x1="0" y1="-11" x2="0" y2="11"/>
    </g>
    <!-- DNA -->
    <g transform="translate(1641,100) rotate(-6) scale(0.55)">
      <path d="M-7 -12 C2 -7 -3 -1 6 4 C2 -1 -3 -7 -7 -12"/><path d="M-7 4 C2 9 -3 15 6 20"/>
      <line x1="-5" y1="-9" x2="5" y2="-9"/><line x1="-6" y1="-1" x2="6" y2="-1"/><line x1="-5" y1="7" x2="5" y2="7"/>
    </g>
    <!-- clock 2 -->
    <g transform="translate(1700,119) rotate(10) scale(0.5)">
      <circle r="13"/><line x1="0" y1="0" x2="0" y2="-7"/><line x1="0" y1="0" x2="5" y2="3"/>
    </g>
    <!-- flask 2 -->
    <g transform="translate(1756,104) rotate(-14) scale(0.55)">
      <path d="M-3 -11 L-3 -1 L-9 11 C-10 13 -8 14 -6 14 L6 14 C8 14 10 13 9 11 L3 -1 L3 -11"/><line x1="-4" y1="-11" x2="4" y2="-11"/>
    </g>
    <!-- graduation cap 2 -->
    <g transform="translate(1815,119) rotate(4) scale(0.6)">
      <path d="M-14 0 L0 -7 L14 0 L0 7 Z"/><path d="M-7 3 L-7 10 C-7 13 7 13 7 10 L7 3"/><line x1="14" y1="0" x2="14" y2="10"/>
    </g>
    <!-- pi 2 -->
    <text x="1867" y="101" font-size="18" font-weight="800" stroke="none" fill="#000000" fill-opacity="0.13" transform="rotate(-8 1867 101)">&#960;</text>
    <!-- chip 2 -->
    <g transform="translate(1925,115) rotate(0) scale(0.55)">
      <rect x="-10" y="-10" width="20" height="20" rx="3"/>
      <line x1="-15" y1="-5" x2="-10" y2="-5"/><line x1="-15" y1="5" x2="-10" y2="5"/>
      <line x1="15" y1="-5" x2="10" y2="-5"/><line x1="15" y1="5" x2="10" y2="5"/>
    </g>
    <!-- multiply 2 -->
    <g transform="translate(1980,101) rotate(-20) scale(0.55)">
      <line x1="-8" y1="-8" x2="8" y2="8"/><line x1="8" y1="-8" x2="-8" y2="8"/>
    </g>
  </g>
</svg>
