<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" stroke="#FFFFFF" stroke-opacity="0.11" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" font-family="Inter, Arial, Helvetica, sans-serif">
  <!-- plus -->
  <g transform="translate(299,39) rotate(-10)">
    <line x1="-10" y1="0" x2="10" y2="0"/>
    <line x1="0" y1="-10" x2="0" y2="10"/>
  </g>

  <!-- multiply -->
  <g transform="translate(145,123) rotate(-18)">
    <line x1="-8" y1="-8" x2="8" y2="8"/>
    <line x1="8" y1="-8" x2="-8" y2="8"/>
  </g>

  <!-- equals -->
  <g transform="translate(340,315) rotate(14)">
    <line x1="-11" y1="-5" x2="11" y2="-5"/>
    <line x1="-11" y1="5" x2="11" y2="5"/>
  </g>

  <!-- square root -->
  <g transform="translate(406,65) rotate(-8)" stroke-width="2.4">
    <path d="M-12 4 L-7 9 L-2 -9 L14 -9"/>
  </g>

  <!-- pi -->
  <text x="207" y="41" font-size="28" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-10 207 41)">π</text>

  <!-- sigma -->
  <text x="121" y="242" font-size="27" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-2 121 242)">∑</text>

  <!-- x squared -->
  <text x="39" y="112" font-size="22" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(2 39 112)">x²</text>

  <!-- half fraction -->
  <text x="304" y="259" font-size="20" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-6 304 259)">½</text>

  <!-- divide -->
  <g transform="translate(434,171) rotate(8)">
    <line x1="-10" y1="0" x2="10" y2="0"/>
    <circle cx="0" cy="-8" r="1.6" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
    <circle cx="0" cy="8" r="1.6" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- code brackets -->
  <text x="255" y="441" font-size="22" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-10 255 441)">&lt;/&gt;</text>

  <!-- chip -->
  <g transform="translate(188,262) rotate(0)" stroke-width="2.2">
    <rect x="-10" y="-10" width="20" height="20" rx="3"/>
    <line x1="-15" y1="-5" x2="-10" y2="-5"/>
    <line x1="-15" y1="5" x2="-10" y2="5"/>
    <line x1="15" y1="-5" x2="10" y2="-5"/>
    <line x1="15" y1="5" x2="10" y2="5"/>
  </g>

  <!-- wifi -->
  <g transform="translate(393,273) rotate(8)" stroke-width="2.2">
    <path d="M-10 -2 C-4 -9 4 -9 10 -2"/>
    <path d="M-5 2 C-2 -2 2 -2 5 2"/>
    <circle cx="0" cy="6" r="1.4" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- binary -->
  <text x="298" y="183" font-size="18" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(4 298 183)">01</text>

  <!-- quote -->
  <text x="141" y="425" font-size="34" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(-4 141 425)">&#8220;</text>

  <!-- letter A -->
  <text x="101" y="337" font-size="24" font-weight="800" stroke="none" fill="#FFFFFF" fill-opacity="0.11" transform="rotate(14 101 337)">A</text>

  <!-- speech bubble -->
  <g transform="translate(97,189) rotate(4)" stroke-width="2.2">
    <path d="M-13 -8 L13 -8 C15 -8 16 -7 16 -5 L16 3 C16 5 15 6 13 6 L-3 6 L-9 11 L-8 6 L-13 6 C-15 6 -16 5 -16 3 L-16 -5 C-16 -7 -15 -8 -13 -8 Z"/>
  </g>

  <!-- pencil -->
  <g transform="translate(448,299) rotate(-52)">
    <path d="M-12 7 L7 7 L12 0 L7 -7 L-12 -7 Z"/>
    <line x1="-5" y1="-7" x2="-5" y2="7"/>
  </g>

  <!-- hourglass -->
  <g transform="translate(264,318) rotate(4)" stroke-width="2.2">
    <path d="M-8 -11 L8 -11 L0 0 L8 11 L-8 11 L0 0 Z"/>
    <line x1="-10" y1="-11" x2="10" y2="-11"/>
    <line x1="-10" y1="11" x2="10" y2="11"/>
  </g>

  <!-- column -->
  <g transform="translate(385,357) rotate(-8)" stroke-width="2.2">
    <rect x="-12" y="-12" width="24" height="5" rx="1"/>
    <rect x="-12" y="9" width="24" height="5" rx="1"/>
    <line x1="-7" y1="-7" x2="-7" y2="9"/>
    <line x1="0" y1="-7" x2="0" y2="9"/>
    <line x1="7" y1="-7" x2="7" y2="9"/>
  </g>

  <!-- clock -->
  <g transform="translate(125,42) rotate(-6)" stroke-width="2.2">
    <circle r="13"/>
    <line x1="0" y1="0" x2="0" y2="-7"/>
    <line x1="0" y1="0" x2="5" y2="3"/>
  </g>

  <!-- scroll -->
  <g transform="translate(67,48) rotate(2)" stroke-width="2.2">
    <rect x="-9" y="-11" width="18" height="22" rx="1"/>
    <circle cx="-9" cy="-11" r="3"/>
    <circle cx="-9" cy="11" r="3"/>
    <circle cx="9" cy="-11" r="3"/>
    <circle cx="9" cy="11" r="3"/>
  </g>

  <!-- globe -->
  <g transform="translate(364,207) rotate(-8)" stroke-width="2">
    <circle r="13"/>
    <ellipse rx="5.5" ry="13"/>
    <line x1="-13" y1="0" x2="13" y2="0"/>
  </g>

  <!-- flag -->
  <g transform="translate(440,393) rotate(-8)" stroke-width="2.2">
    <line x1="0" y1="-13" x2="0" y2="13"/>
    <path d="M0 -11 L15 -6 L0 -1 Z"/>
  </g>

  <!-- DNA -->
  <g transform="translate(33,334) rotate(-6)" stroke-width="2.2">
    <path d="M-7 -12 C2 -7 -3 -1 6 4 C2 -1 -3 -7 -7 -12"/>
    <path d="M-7 4 C2 9 -3 15 6 20"/>
    <line x1="-5" y1="-9" x2="5" y2="-9"/>
    <line x1="-6" y1="-1" x2="6" y2="-1"/>
    <line x1="-5" y1="7" x2="5" y2="7"/>
  </g>

  <!-- leaf -->
  <g transform="translate(240,104) rotate(2)" stroke-width="2.2">
    <path d="M0 -13 C10 -9 10 9 0 13 C-10 9 -10 -9 0 -13 Z"/>
    <line x1="0" y1="-11" x2="0" y2="11"/>
  </g>

  <!-- molecule -->
  <g transform="translate(36,422) rotate(4)" stroke-width="2">
    <path d="M0 -11 L9.5 -5.5 L9.5 5.5 L0 11 L-9.5 5.5 L-9.5 -5.5 Z"/>
    <circle cx="0" cy="-11" r="1.6" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
    <circle cx="0" cy="11" r="1.6" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- flask -->
  <g transform="translate(199,172) rotate(-2)" stroke-width="2.2">
    <path d="M-3 -11 L-3 -1 L-9 11 C-10 13 -8 14 -6 14 L6 14 C8 14 10 13 9 11 L3 -1 L3 -11"/>
    <line x1="-4" y1="-11" x2="4" y2="-11"/>
  </g>

  <!-- atom -->
  <g transform="translate(216,393) rotate(6)" stroke-width="2">
    <ellipse rx="13" ry="5.5"/>
    <ellipse rx="13" ry="5.5" transform="rotate(60)"/>
    <ellipse rx="13" ry="5.5" transform="rotate(120)"/>
    <circle r="2.2" fill="#FFFFFF" fill-opacity="0.11" stroke="none"/>
  </g>

  <!-- open book -->
  <g transform="translate(52,276) rotate(-2)">
    <path d="M-14 -5 C-9 -9 -3.5 -9 0 -5 C3.5 -9 9 -9 14 -5 L14 7 C9 3.5 3.5 3.5 0 7 C-3.5 3.5 -9 3.5 -14 7 Z"/>
    <line x1="0" y1="-5" x2="0" y2="7"/>
  </g>

  <!-- graduation cap -->
  <g transform="translate(162,347) rotate(2)">
    <path d="M-14 0 L0 -7 L14 0 L0 7 Z"/>
    <path d="M-7 3 L-7 10 C-7 13 7 13 7 10 L7 3"/>
    <line x1="14" y1="0" x2="14" y2="10"/>
  </g>
</svg>
