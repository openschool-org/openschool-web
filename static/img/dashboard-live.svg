<svg width="640" height="480" viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, Helvetica, sans-serif">
  <defs>
    <clipPath id="chartClip">
      <rect x="212" y="214" width="340" height="102" />
    </clipPath>
  </defs>

  <rect x="1" y="1" width="638" height="478" rx="24" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="20" y="16" width="24" height="24" rx="7" fill="#6366F1"/>
  <path d="M28 32C28 27.5817 31.5817 24 36 24C37.5 24 38.9 24.5 40 25.4" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <text x="54" y="33" font-size="15" font-weight="800" fill="#111111">OpenSchool</text>

  <!-- Live badge -->
  <g>
    <rect x="546" y="18" width="72" height="22" rx="11" fill="#FEF2F2"/>
    <circle cx="562" cy="29" r="4" fill="#EF4444">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <text x="573" y="33" font-size="10" font-weight="800" fill="#DC2626" letter-spacing="0.5">LIVE</text>
  </g>
  <line x1="0" y1="56" x2="640" y2="56" stroke="#E5E7EB" stroke-width="1.5"/>

  <!-- Sidebar -->
  <line x1="160" y1="56" x2="160" y2="480" stroke="#E5E7EB" stroke-width="1.5"/>
  <rect x="16" y="76" width="128" height="36" rx="10" fill="#EEF0FF"/>
  <rect x="16" y="76" width="3" height="36" rx="1.5" fill="#6366F1"/>
  <text x="34" y="99" font-size="12" font-weight="700" fill="#4F46E5">Dashboard</text>

  <circle cx="20" cy="140" r="3" fill="#D1D5DB"/>
  <text x="30" y="145" font-size="12" font-weight="500" fill="#666666">Academic Years</text>
  <circle cx="20" cy="186" r="3" fill="#D1D5DB"/>
  <text x="30" y="191" font-size="12" font-weight="500" fill="#666666">Classes</text>
  <circle cx="20" cy="232" r="3" fill="#D1D5DB"/>
  <text x="30" y="237" font-size="12" font-weight="500" fill="#666666">Students</text>
  <circle cx="20" cy="278" r="3" fill="#D1D5DB"/>
  <text x="30" y="283" font-size="12" font-weight="500" fill="#666666">Attendance</text>
  <circle cx="20" cy="324" r="3" fill="#D1D5DB"/>
  <text x="30" y="329" font-size="12" font-weight="500" fill="#666666">Guardians</text>

  <!-- Stat tiles -->
  <g>
    <rect x="192" y="80" width="130" height="76" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="208" y="106" font-size="10" fill="#666666">Students</text>
    <text x="208" y="130" font-size="20" font-weight="800" fill="#111111">1,248</text>
    <text x="208" y="146" font-size="9" font-weight="700" fill="#16A34A">+4.2%</text>
  </g>
  <g>
    <rect x="338" y="80" width="130" height="76" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="354" y="106" font-size="10" fill="#666666">Classes</text>
    <text x="354" y="130" font-size="20" font-weight="800" fill="#111111">42</text>
    <text x="354" y="146" font-size="9" font-weight="700" fill="#16A34A">+2</text>
  </g>

  <!-- Attendance ring stat -->
  <g transform="translate(484,80)">
    <rect width="130" height="76" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="16" y="26" font-size="10" fill="#666666">Attendance</text>
    <g transform="translate(38,50)">
      <circle r="19" fill="none" stroke="#EEF0FF" stroke-width="6"/>
      <circle r="19" fill="none" stroke="#6366F1" stroke-width="6" stroke-linecap="round"
        stroke-dasharray="119.4" stroke-dashoffset="119.4" transform="rotate(-90)">
        <animate attributeName="stroke-dashoffset" from="119.4" to="4.8" dur="1.6s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      </circle>
    </g>
    <text x="66" y="46" font-size="15" font-weight="800" fill="#111111">96%</text>
    <text x="66" y="60" font-size="9" font-weight="700" fill="#16A34A">+1.1%</text>
  </g>

  <!-- Chart card -->
  <rect x="192" y="172" width="422" height="168" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="212" y="198" font-size="12" font-weight="700" fill="#111111">Attendance — This Week</text>

  <g clip-path="url(#chartClip)">
    <rect x="212" y="286" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.55">
      <animate attributeName="height" from="0" to="60" dur="0.7s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="256" dur="0.7s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="264" y="316" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.55">
      <animate attributeName="height" from="0" to="80" dur="0.7s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="236" dur="0.7s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="316" y="316" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.55">
      <animate attributeName="height" from="0" to="45" dur="0.7s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="271" dur="0.7s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="368" y="316" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.65">
      <animate attributeName="height" from="0" to="95" dur="0.7s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="221" dur="0.7s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="420" y="316" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.55">
      <animate attributeName="height" from="0" to="70" dur="0.7s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="246" dur="0.7s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="472" y="316" width="28" height="0" rx="6" fill="#6366F1" fill-opacity="0.55">
      <animate attributeName="height" from="0" to="55" dur="0.7s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="261" dur="0.7s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>
    <rect x="524" y="316" width="28" height="0" rx="6" fill="#6366F1">
      <animate attributeName="height" from="0" to="88" dur="0.7s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
      <animate attributeName="y" from="316" to="228" dur="0.7s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </rect>

    <!-- Trend line draws in after bars -->
    <path d="M226 256 L278 236 L330 271 L382 221 L434 246 L486 261 L538 228"
      fill="none" stroke="#0EA5E9" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
      stroke-dasharray="420" stroke-dashoffset="420">
      <animate attributeName="stroke-dashoffset" from="420" to="0" dur="1s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
    </path>
  </g>
  <line x1="212" y1="316" x2="552" y2="316" stroke="#E5E7EB" stroke-width="1.5"/>

  <text x="221" y="330" font-size="9" fill="#9AA0AC">M</text>
  <text x="273" y="330" font-size="9" fill="#9AA0AC">T</text>
  <text x="325" y="330" font-size="9" fill="#9AA0AC">W</text>
  <text x="377" y="330" font-size="9" fill="#9AA0AC">T</text>
  <text x="429" y="330" font-size="9" fill="#9AA0AC">F</text>
  <text x="481" y="330" font-size="9" fill="#9AA0AC">S</text>
  <text x="533" y="330" font-size="9" font-weight="700" fill="#4F46E5">S</text>

  <!-- Table card -->
  <rect x="192" y="356" width="422" height="104" rx="16" fill="#FFFFFF" stroke="#E5E7EB"/>

  <circle cx="214" cy="380" r="9" fill="#E5E7EB"/>
  <rect x="232" y="375" width="70" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="312" y="375" width="40" height="8" rx="4" fill="#EDEDF2"/>
  <rect x="536" y="371" width="58" height="18" rx="9" fill="#ECFDF5"/>
  <text x="546" y="384" font-size="9" font-weight="700" fill="#059669">Present</text>

  <circle cx="214" cy="408" r="9" fill="#E5E7EB"/>
  <rect x="232" y="403" width="70" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="312" y="403" width="40" height="8" rx="4" fill="#EDEDF2"/>
  <rect x="536" y="399" width="58" height="18" rx="9" fill="#ECFDF5"/>
  <text x="546" y="412" font-size="9" font-weight="700" fill="#059669">Present</text>

  <!-- This row "marks itself present" live -->
  <circle cx="214" cy="436" r="9" fill="#E5E7EB"/>
  <rect x="232" y="431" width="70" height="8" rx="4" fill="#D1D5DB"/>
  <rect x="312" y="431" width="40" height="8" rx="4" fill="#EDEDF2"/>
  <rect x="536" y="427" width="58" height="18" rx="9" fill="#F4F4F5">
    <animate attributeName="fill" values="#F4F4F5;#F4F4F5;#ECFDF5;#ECFDF5" keyTimes="0;0.6;0.75;1" dur="2.4s" begin="1.1s" fill="freeze"/>
  </rect>
  <text x="551" y="440" font-size="9" font-weight="700" fill="#9CA3AF">
    <animate attributeName="fill" values="#9CA3AF;#9CA3AF;#059669;#059669" keyTimes="0;0.6;0.75;1" dur="2.4s" begin="1.1s" fill="freeze"/>
    ···
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.6;0.7;1" dur="2.4s" begin="1.1s" fill="freeze"/>
  </text>
  <path d="M544 436L549 441L558 429" fill="none" stroke="#059669" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="20" stroke-dashoffset="20">
    <animate attributeName="stroke-dashoffset" from="20" to="0" dur="0.35s" begin="1.85s" fill="freeze"/>
  </path>
</svg>
